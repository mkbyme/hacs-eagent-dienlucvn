# Biểu đồ sản lượng điện và tiền ước tính 10 ngày gần nhất
# Nguồn:
#   - sensor.CUSTOMER_CODE_econ_total_new → attribute "history"  (kWh/ngày + chỉ số tích lũy)
#   - sensor.CUSTOMER_CODE_ecost_daily_new                        (tiền hôm nay - dùng cho state hiển thị)
# Thay CUSTOMER_CODE bằng mã khách hàng thực tế (chữ thường), ví dụ: a3146tl11
#
# Bậc giá tính tạm theo bậc 1 (1.984đ/kWh) để ước tính — dùng giá trị thực từ sensor ecost_* nếu cần chính xác.

type: custom:apexcharts-card
graph_span: 10d
header:
  show: true
  title: Tiêu thụ điện 10 ngày
  show_states: true
series:
  - entity: sensor.CUSTOMER_CODE_econ_total_new
    name: Tiêu thụ (kWh)
    type: column
    color: var(--primary-color)
    data_generator: |
      const list = entity.attributes.history;
      return list.map((item) => {
        // Chuyển đổi định dạng ngày DD/MM/YYYY sang YYYY-MM-DD để Javascript hiểu đúng
        const parts = item.date.split('/');
        const formattedDate = `${parts[2]}-${parts[1]}-${parts[0]}`;
        return [new Date(formattedDate).getTime(), item.consumption];
      });
