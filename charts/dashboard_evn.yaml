# Dashboard EVN tổng hợp — dán vào Lovelace dạng "Manual card" (type: vertical-stack)
# Thay toàn bộ CUSTOMER_CODE bằng mã khách hàng thực tế (chữ thường), ví dụ: a3146tl11
#
# Yêu cầu:
#   - apexcharts-card (HACS → Frontend)
#   - mushroom-cards (HACS → Frontend) — cho phần thông tin nhanh (tùy chọn)

type: vertical-stack
cards:

  # ── Thông tin nhanh ─────────────────────────────────────────────────────────
  - type: entities
    title: Thông tin tài khoản điện
    entities:
      - entity: sensor.CUSTOMER_CODE_payment_status
        name: Trạng thái thanh toán
      - entity: sensor.CUSTOMER_CODE_bill_amount
        name: Tiền hóa đơn gần nhất
      - entity: sensor.CUSTOMER_CODE_econ_monthly
        name: Sản lượng tháng này
      - entity: sensor.CUSTOMER_CODE_ecost_monthly
        name: Tiền ước tính tháng này
      - entity: sensor.CUSTOMER_CODE_econ_daily_new
        name: Sản lượng hôm nay
      - entity: sensor.CUSTOMER_CODE_latest_update
        name: Cập nhật lúc

  # ── Biểu đồ 1: Tiền điện theo tháng ────────────────────────────────────────
  - type: custom:apexcharts-card
    header:
      show: true
      title: Tiền điện theo tháng (VNĐ)
      show_states: true
      colorize_states: true
    chart_type: bar
    apex_config:
      chart:
        height: 260
        toolbar:
          show: false
      dataLabels:
        enabled: true
        formatter: |
          EVAL:function(val) {
            if (!val) return '';
            return new Intl.NumberFormat('vi-VN', { notation: 'compact', maximumFractionDigits: 1 }).format(val) + 'đ';
          }
        offsetY: -20
        style:
          fontSize: 10px
      plotOptions:
        bar:
          borderRadius: 4
          columnWidth: 60%
          dataLabels:
            position: top
      xaxis:
        labels:
          rotate: -30
          style:
            fontSize: 11px
      yaxis:
        labels:
          formatter: |
            EVAL:function(val) {
              return new Intl.NumberFormat('vi-VN', { notation: 'compact' }).format(val) + 'đ';
            }
      tooltip:
        y:
          formatter: |
            EVAL:function(val) { return new Intl.NumberFormat('vi-VN').format(val) + ' VNĐ'; }
    series:
      - entity: sensor.CUSTOMER_CODE_bill_amount
        name: Tiền hóa đơn
        color: '#e53935'
        data_generator: |
          const bills = entity.attributes.history || [];
          return bills.slice().reverse().map(b => {
            const [m, y] = b.period.split('/');
            return { x: String(m).padStart(2,'0') + '/' + y, y: b.amount_before_tax + b.tax };
          });

  # ── Biểu đồ 2: Sản lượng kWh theo tháng ────────────────────────────────────
  - type: custom:apexcharts-card
    header:
      show: true
      title: Sản lượng điện theo tháng (kWh)
      show_states: false
    apex_config:
      chart:
        height: 260
        toolbar:
          show: false
      dataLabels:
        enabled: true
        formatter: |
          EVAL:function(val) { return val ? val + ' kWh' : ''; }
        offsetY: -20
        style:
          fontSize: 10px
      plotOptions:
        bar:
          borderRadius: 4
          columnWidth: 55%
          dataLabels:
            position: top
      xaxis:
        labels:
          rotate: -30
          style:
            fontSize: 11px
      yaxis:
        - title:
            text: kWh
          labels:
            formatter: |
              EVAL:function(val) { return val + ' kWh'; }
        - opposite: true
          title:
            text: Chỉ số
          labels:
            formatter: |
              EVAL:function(val) { return Math.round(val).toLocaleString('vi-VN'); }
      tooltip:
        shared: true
        intersect: false
    series:
      - entity: sensor.CUSTOMER_CODE_bill_amount
        name: Tiêu thụ (kWh)
        type: column
        color: '#1e88e5'
        data_generator: |
          const bills = entity.attributes.history || [];
          return bills.slice().reverse().map(b => {
            const [m, y] = b.period.split('/');
            return { x: String(m).padStart(2,'0') + '/' + y, y: b.consumption_kwh };
          });
      - entity: sensor.CUSTOMER_CODE_bill_amount
        name: Chỉ số cuối kỳ
        type: line
        color: '#fb8c00'
        curve: smooth
        stroke_width: 2
        data_generator: |
          const bills = entity.attributes.history || [];
          return bills.slice().reverse().map(b => {
            const [m, y] = b.period.split('/');
            return { x: String(m).padStart(2,'0') + '/' + y, y: b.new_index };
          });

  # ── Biểu đồ 3: Sản lượng 10 ngày gần nhất ──────────────────────────────────
  - type: custom:apexcharts-card
    header:
      show: true
      title: Điện tiêu thụ 10 ngày gần nhất
      show_states: true
      colorize_states: true
    apex_config:
      chart:
        height: 280
        toolbar:
          show: false
      dataLabels:
        enabled: true
        enabledOnSeries:
          - 0
        formatter: |
          EVAL:function(val) { return val ? val.toFixed(1) : ''; }
        offsetY: -22
        style:
          fontSize: 10px
          colors:
            - '#1e88e5'
      plotOptions:
        bar:
          borderRadius: 4
          columnWidth: 60%
          dataLabels:
            position: top
      xaxis:
        labels:
          rotate: -30
          style:
            fontSize: 11px
      yaxis:
        - title:
            text: kWh/ngày
          min: 0
          labels:
            formatter: |
              EVAL:function(val) { return val.toFixed(0); }
        - opposite: true
          title:
            text: Chỉ số (kWh)
          labels:
            formatter: |
              EVAL:function(val) { return val.toFixed(0); }
      tooltip:
        shared: true
        intersect: false
        y:
          - formatter: |
              EVAL:function(val) {
                if (val == null) return 'Chưa có dữ liệu';
                const cost = val * 1984 * 1.08;
                return val.toFixed(2) + ' kWh (~' + Math.round(cost).toLocaleString('vi-VN') + 'đ)';
              }
          - formatter: |
              EVAL:function(val) { return val != null ? val.toFixed(2) + ' kWh' : ''; }
    series:
      - entity: sensor.CUSTOMER_CODE_econ_total_new
        name: Sản lượng/ngày (kWh)
        type: column
        color: '#1e88e5'
        data_generator: |
          const days = entity.attributes.history || [];
          return days.map(d => {
            const [day, month] = d.date.split('/');
            return { x: day + '/' + month, y: d.consumption > 0 ? d.consumption : null };
          });
      - entity: sensor.CUSTOMER_CODE_econ_total_new
        name: Chỉ số tích lũy
        type: line
        color: '#43a047'
        curve: smooth
        stroke_width: 2
        data_generator: |
          const days = entity.attributes.history || [];
          return days.map(d => {
            const [day, month] = d.date.split('/');
            return { x: day + '/' + month, y: d.index };
          });
