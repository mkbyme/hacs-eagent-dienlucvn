# Dashboard EVN tổng hợp — dán vào Lovelace dạng "Manual card" (type: vertical-stack)
# Thay toàn bộ CUSTOMER_CODE bằng mã khách hàng thực tế (chữ thường), ví dụ: a3146tl11
#
# Yêu cầu:
#   - apexcharts-card (HACS → Frontend)
#   - mushroom-cards (HACS → Frontend) — cho phần thông tin nhanh (tùy chọn)

square: false
type: grid
cards:
  - type: markdown
    title: 🧾 HÓA ĐƠN TIỀN ĐIỆN EVN
    content: >-
      <div style="padding: 10px; border: 1px dashed #777; border-radius: 8px;">
       
       <div style="text-align: center;">
         <h3 style="margin: 0;">TỔNG CÔNG TY ĐIỆN LỰC</h3>
         
         <div style="font-size: 13px;">Mã điểm đo: 
                                  <b>{{ state_attr("sensor.CUSTOMER_CODE_payment_status", "meter") }}</b> (Sảnh)</div>


       </div>
      <br/>
       <table style="width: 100%; border-collapse: collapse; font-size: 13px;">
         
         <tr>
           <td colspan="2" style="padding: 4px 0;"><b>Từ ngày:</b> {{ states('sensor.CUSTOMER_CODE_from_date') }}</td>
           <td colspan="2" style="text-align: right; padding: 4px 0;"><b>Đến ngày:</b> {{ states('sensor.CUSTOMER_CODE_to_date') }}</td>
         </tr>
         <tr style="border-bottom: 1px solid #555;">
           <td colspan="2" style="padding: 4px 0 10px 0;"><b>Trạng thái:</b> 
             <span style="color: {% if is_state('sensor.CUSTOMER_CODE_payment_status', 'Đã thanh toán') %} #4CAF50 {% else %} #FF9800 {% endif %}; font-weight: bold;">
               {{ states('sensor.CUSTOMER_CODE_payment_status') }}
             </span>
           </td>
           <td colspan="2" style="text-align: right; padding: 4px 0 10px 0; font-size: 11px;">
             <i>Cập nhật: {{ as_timestamp(states('sensor.CUSTOMER_CODE_latest_update')) | timestamp_custom('%d/%m/%Y %H:%M') }}</i>
           </td>
         </tr>

         <tr style="font-weight: bold; background-color: rgba(255,255,255,0.1);">
           <th style="text-align: left; padding: 6px;">Hạng mục</th>
           <th style="text-align: right; padding: 6px; width: 20%;">Cũ</th>
           <th style="text-align: right; padding: 6px; width: 20%;">Mới</th>
           <th style="text-align: right; padding: 6px; width: 25%;">Sản lượng</th>
         </tr>

         <tr style="border-bottom: 1px dashed #555;">
           <td style="padding: 8px 6px;"><b>Chỉ số tổng</b></td>
           <td style="text-align: right;">{{ states('sensor.CUSTOMER_CODE_econ_total_old') }}</td>
           <td style="text-align: right;">{{ states('sensor.CUSTOMER_CODE_econ_total_new') }}</td>
           <td style="text-align: right; color: #03A9F4; font-weight: bold;">{{ states('sensor.CUSTOMER_CODE_econ_monthly') }}</td>
         </tr>

         {# --- Đoạn tính toán bóc tách dữ liệu lịch sử từ mảng history --- #}
         {% set history = state_attr("sensor.CUSTOMER_CODE_econ_total_new", "history") %}
         {% if history is not none and history | length >= 2 %}
           {# Hôm qua là phần tử cuối cùng #}
           {% set today = history[-1] %}
           {% set today_new = today.index | float(0) %}
           {% set today_old = today_new - (today.consumption | float(0)) %}
           
           {# Hôm kia là phần tử kế cuối #}
           {% set yesterday = history[-2] %}
           {% set yesterday_new = yesterday.index | float(0) %}
           {% set yesterday_old = yesterday_new - (yesterday.consumption | float(0)) %}
         {% else %}
           {% set today_old, today_new, yesterday_old, yesterday_new = '-', '-', '-', '-' %}
         {% endif %}

         <tr style="border-bottom: 1px dashed #555; font-size: 12px;">
           <td style="padding: 6px 6px 6px 15px;">• Hôm kia</td>
           <td style="text-align: right;">{{ yesterday_old | round(2) if yesterday_old != '-' else '-' }}</td>
           <td style="text-align: right;">{{ yesterday_new | round(2) if yesterday_new != '-' else '-' }}</td>
           <td style="text-align: right;">{{ states('sensor.CUSTOMER_CODE_econ_daily_old') }} kWh</td>
         </tr>
         <tr style="border-bottom: 1px solid #555; font-size: 12px;">
           <td style="padding: 6px 6px 6px 15px;">• Hôm qua</td>
           <td style="text-align: right;">{{ today_old | round(2) if today_old != '-' else '-' }}</td>
           <td style="text-align: right;">{{ today_new | round(2) if today_new != '-' else '-' }}</td>
           <td style="text-align: right;">{{ states('sensor.CUSTOMER_CODE_econ_daily_new') }} kWh</td>
         </tr>

         <tr>
           <td colspan="2" style="padding: 10px 6px 4px 6px;">Tiền điện hôm kia:</td>
           <td colspan="2" style="text-align: right; padding: 10px 6px 4px 6px;">{{ "{:,.0f}".format(states('sensor.CUSTOMER_CODE_ecost_daily_old') | float(0)) }} VNĐ</td>
         </tr>
         <tr>
           <td colspan="2" style="padding: 4px 6px;">Tiền điện hôm qua:</td>
           <td colspan="2" style="text-align: right; padding: 4px 6px;">{{ "{:,.0f}".format(states('sensor.CUSTOMER_CODE_ecost_daily_new') | float(0)) }} VNĐ</td>
         </tr>
         <tr style="border-bottom: 2px solid #f44336;">
           <td colspan="2" style="padding: 4px 6px 10px 6px;">Tiền tháng này (tạm tính):</td>
           <td colspan="2" style="text-align: right; padding: 4px 6px 10px 6px; color: #FF9800;">{{ "{:,.0f}".format(states('sensor.CUSTOMER_CODE_ecost_monthly') | float(0)) }} VNĐ</td>
         </tr>
         <tr>
           {%- set bill_label= "HÓA ĐƠN THÁNH NÀY (Cần thanh toán)" %}
           {%- if is_state('sensor.CUSTOMER_CODE_payment_status', 'Đã thanh toán') %}
              {%- set bill_label= "HÓA ĐƠN THÁNG TRƯỚC" %}
           {%- endif %}
           <td colspan="2" style="padding: 10px 6px; font-size: 15px; font-weight: bold; color: #f44336;">{{ bill_label }}:</td>
           <td colspan="2" style="text-align: right; padding: 10px 6px; font-size: 16px; font-weight: bold; color: #f44336;">
             {{ "{:,.0f}".format(states('sensor.CUSTOMER_CODE_bill_amount') | float(0)) }} VNĐ
           </td>
         </tr>
       </table>

      {%- if not is_state('sensor.CUSTOMER_CODE_payment_status', 'Đã thanh toán') %}

      <br/>

      <b>Mã QR Thanh toán: {{
      "{:,.0f}".format(states('sensor.CUSTOMER_CODE_bill_amount') | float(0)) }}
      VNĐ</b>

      <br/>

      <img src="{{state_attr('image.qrcode_hoa_don_dien','entity_picture')}}"/>

      {%- endif %}
  - type: custom:apexcharts-card
    graph_span: 10d
    header:
      show: true
      title: Tiêu thụ điện 10 ngày
      show_states: true
    series:
      - entity: sensor.CUSTOMER_CODE_econ_total_new
        name: Tiêu thụ (kWh)
        type: column
        color: var(--primary-color)
        data_generator: |
          const list = entity.attributes.history;
          return list.map((item) => {
            // Chuyển đổi định dạng ngày DD/MM/YYYY sang YYYY-MM-DD để Javascript hiểu đúng
            const parts = item.date.split('/');
            const formattedDate = `${parts[2]}-${parts[1]}-${parts[0]}`;
            return [new Date(formattedDate).getTime(), item.consumption];
          });
  - type: custom:apexcharts-card
    graph_span: 10d
    header:
      show: true
      title: Chỉ số công tơ điện 10 ngày
      show_states: true
    series:
      - entity: sensor.CUSTOMER_CODE_econ_total_new
        name: Chỉ số (Index)
        type: area
        color: var(--primary-color)
        data_generator: |
          return entity.attributes.history.map((item) => {
            const parts = item.date.split('/');
            const formattedDate = `${parts[2]}-${parts[1]}-${parts[0]}`;
            return [new Date(formattedDate).getTime(), item.index];
          });
  - type: custom:apexcharts-card
    graph_span: 180d
    header:
      show: true
      title: Hòa đơn theo tháng
      show_states: true
    series:
      - entity: sensor.CUSTOMER_CODE_bill_amount
        name: Tổng tiền (sau VAT)
        type: column
        color: var(--primary-color)
        data_generator: >
          // 1. Lấy mảng lịch sử cũ và đảo ngược chuỗi thời gian

          const history = entity.attributes.history || [];

          const sortedHistory = [...history].reverse();


          // 2. Chuyển đổi lịch sử cũ thành định dạng cấu trúc của ApexCharts
          [Thời gian, Giá trị]

          const chartData = sortedHistory.map((item) => {
            const parts = item.from_date.split('/');
            const formattedDate = `${parts[2]}-${parts[1]}-${parts[0]}`;
            const totalAmount = (item.amount_before_tax || 0) + (item.tax || 0);
            return [new Date(formattedDate).getTime(), totalAmount];
          });


          // 3. Lấy giá trị tiền tháng hiện tại từ sensor phụ (đã là số tiền gồm
          thuế/tạm tính)

          const currentMonthMoney =
          parseFloat(hass.states['sensor.CUSTOMER_CODE_ecost_monthly'].state);


          // 4. Nạp thêm vào biểu đồ nếu hợp lệ

          if (!isNaN(currentMonthMoney) && currentMonthMoney > 0) {
            chartData.push([new Date().getTime(), currentMonthMoney]);
          }


          return chartData;
    apex_config:
      xaxis:
        labels:
          format: MM/yyyy
  - type: custom:apexcharts-card
    graph_span: 180d
    header:
      show: true
      title: Sản lượng điện tiêu thụ theo tháng
      show_states: true
    series:
      - entity: sensor.CUSTOMER_CODE_bill_amount
        name: Điện năng tiêu thụ
        unit: " kWh"
        type: column
        color: var(--primary-color)
        data_generator: >
          // 1. Lấy mảng lịch sử cũ và đảo ngược chuỗi thời gian

          const history = entity.attributes.history || [];

          const sortedHistory = [...history].reverse();


          // 2. Chuyển đổi lịch sử cũ thành định dạng cấu trúc của ApexCharts
          [Thời gian, Giá trị]

          const chartData = sortedHistory.map((item) => {
            const parts = item.from_date.split('/');
            const formattedDate = `${parts[2]}-${parts[1]}-${parts[0]}`;
            return [new Date(formattedDate).getTime(), item.consumption_kwh];
          });


          // 3. Lấy giá trị sản lượng tháng hiện tại từ sensor phụ

          const currentMonthKwh =
          parseFloat(hass.states['sensor.CUSTOMER_CODE_econ_monthly'].state);


          // 4. Nếu sensor có dữ liệu hợp lệ (> 0), nạp thêm vào cuối biểu đồ
          (thời gian hiện tại)

          if (!isNaN(currentMonthKwh) && currentMonthKwh > 0) {
            chartData.push([new Date().getTime(), currentMonthKwh]);
          }


          return chartData;
    apex_config:
      xaxis:
        labels:
          format: MM/yyyy
columns: 1
